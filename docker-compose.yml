version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wag-pos-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Walls9977}
      POSTGRES_DB: wag_pos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
     - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wag-network

  # ─── Backend API ──────────────────────────────
  backend:
    build: ./backend
    container_name: wag-pos-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-Walls9977}@postgres:5432/wag_pos
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-changeThisInProduction}
      ALLOWED_ORIGINS: http://localhost:8081,http://localhost:3001,http://localhost:8080
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.wagpos.com}
    ports:
      - "5002:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - wag-network

  # ─── Frontend (Nginx) ─────────────────────────
  frontend:
    build: ./frontend
    container_name: wag-pos-web
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - wag-network

  # ─── Nginx Reverse Proxy (Production) ─────────
  nginx:
    image: nginx:alpine
    container_name: wag-pos-nginx
    ports:
      - "8082:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - wag-network
    profiles:
      - production

volumes:
  postgres_data:
  backend_uploads:

networks:
  wag-network:
    driver: bridge
